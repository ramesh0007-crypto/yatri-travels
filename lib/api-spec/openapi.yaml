openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Yatri Travels API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: packages
    description: Tour packages
  - name: bookings
    description: Bookings
  - name: reviews
    description: Reviews
  - name: gallery
    description: Gallery
  - name: contact
    description: Contact
  - name: admin
    description: Admin panel

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  # Packages
  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List tour packages
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: location
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: minDuration
          schema:
            type: integer
        - in: query
          name: maxDuration
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a tour package (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/featured:
    get:
      operationId: listFeaturedPackages
      tags: [packages]
      summary: List featured packages
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

  /packages/stats:
    get:
      operationId: getPackageStats
      tags: [packages]
      summary: Get aggregate stats (destinations count, total bookings, price range)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageStats"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get a package by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
        "404":
          description: Not found

    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update a tour package (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Delete a tour package (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Bookings
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for current user (admin sees all)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # Payments
  /payments/create-session:
    post:
      operationId: createPaymentSession
      tags: [bookings]
      summary: Create Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentSessionInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSession"

  /payments/webhook:
    post:
      operationId: paymentWebhook
      tags: [bookings]
      summary: Stripe webhook handler
      responses:
        "200":
          description: OK

  # Reviews
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List all reviews
      parameters:
        - in: query
          name: packageId
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    patch:
      operationId: updateReview
      tags: [reviews]
      summary: Update a review
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

    delete:
      operationId: deleteReview
      tags: [reviews]
      summary: Delete a review
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Gallery
  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery images
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"

    post:
      operationId: createGalleryImage
      tags: [gallery]
      summary: Add a gallery image (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete a gallery image (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Contact
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: OK

  # Admin Stats
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{id}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Delete a user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/contacts:
    get:
      operationId: listContacts
      tags: [admin]
      summary: List contact form submissions (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [user, admin]

    # Packages
    Package:
      type: object
      required: [id, title, location, description, images, price, duration, seatsAvailable, featured, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        price:
          type: number
        duration:
          type: integer
        seatsAvailable:
          type: integer
        featured:
          type: boolean
        highlights:
          type: ["string", "null"]
        inclusions:
          type: ["string", "null"]
        avgRating:
          type: ["number", "null"]
        reviewCount:
          type: ["integer", "null"]
        createdAt:
          type: string

    PackageInput:
      type: object
      required: [title, location, description, images, price, duration, seatsAvailable]
      properties:
        title:
          type: string
        location:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        price:
          type: number
        duration:
          type: integer
        seatsAvailable:
          type: integer
        featured:
          type: boolean
        highlights:
          type: string
        inclusions:
          type: string

    PackageUpdate:
      type: object
      properties:
        title:
          type: string
        location:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        price:
          type: number
        duration:
          type: integer
        seatsAvailable:
          type: integer
        featured:
          type: boolean
        highlights:
          type: string
        inclusions:
          type: string

    PackageStats:
      type: object
      required: [totalPackages, totalBookings, totalDestinations, minPrice, maxPrice, happyTravelers]
      properties:
        totalPackages:
          type: integer
        totalBookings:
          type: integer
        totalDestinations:
          type: integer
        minPrice:
          type: number
        maxPrice:
          type: number
        happyTravelers:
          type: integer

    # Bookings
    Booking:
      type: object
      required: [id, userId, packageId, travelDate, seatsBooked, totalAmount, paymentStatus, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        travelDate:
          type: string
        seatsBooked:
          type: integer
        totalAmount:
          type: number
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]
        status:
          type: string
          enum: [confirmed, cancelled, pending]
        stripeSessionId:
          type: ["string", "null"]
        package:
          $ref: "#/components/schemas/Package"
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [packageId, travelDate, seatsBooked]
      properties:
        packageId:
          type: integer
        travelDate:
          type: string
        seatsBooked:
          type: integer

    BookingUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, cancelled, pending]
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]

    PaymentSessionInput:
      type: object
      required: [bookingId]
      properties:
        bookingId:
          type: integer

    PaymentSession:
      type: object
      required: [sessionId, url]
      properties:
        sessionId:
          type: string
        url:
          type: string

    # Reviews
    Review:
      type: object
      required: [id, userId, packageId, rating, comment, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [packageId, rating, comment]
      properties:
        packageId:
          type: integer
        rating:
          type: integer
        comment:
          type: string

    ReviewUpdate:
      type: object
      properties:
        rating:
          type: integer
        comment:
          type: string

    # Gallery
    GalleryImage:
      type: object
      required: [id, imageUrl, title, createdAt]
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        title:
          type: string
        createdAt:
          type: string

    GalleryImageInput:
      type: object
      required: [imageUrl, title]
      properties:
        imageUrl:
          type: string
        title:
          type: string

    # Contact
    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string

    Contact:
      type: object
      required: [id, name, email, subject, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string

    # Admin
    AdminStats:
      type: object
      required: [totalUsers, totalPackages, totalBookings, totalRevenue, pendingBookings, recentBookings]
      properties:
        totalUsers:
          type: integer
        totalPackages:
          type: integer
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        pendingBookings:
          type: integer
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
